```html
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtuális Múzeum</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#111;
}

.main{
    position:relative;
    width:100vw;
    height:100vh;
    background:url('kezdohatter.jpg') center/cover no-repeat;
    transition:transform 1s ease, opacity 1s ease;
}

.hotspot{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    border:2px solid white;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    animation:pulse 3s infinite ease-in-out;
    backdrop-filter:blur(5px);
}

.hotspot:hover{
    background:rgba(255,255,255,0.5);
    transform:scale(1.15);
}

@keyframes pulse{

    0%{
        transform:scale(1);
        box-shadow:0 0 10px rgba(255,255,255,0.3);
    }

    50%{
        transform:scale(1.1);
        box-shadow:0 0 25px rgba(255,255,255,0.7);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 10px rgba(255,255,255,0.3);
    }
}

h1{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    text-shadow:0 0 10px black;
}

/* KATTINTÁS ANIMÁCIÓ */

.fade-out{
    animation:zoomFade 1s forwards;
}

@keyframes zoomFade{

    0%{
        transform:scale(1);
        opacity:1;
        filter:blur(0px);
    }

    100%{
        transform:scale(1.3);
        opacity:0;
        filter:blur(10px);
    }
}

</style>
</head>

<body>

<div class="main" id="main">

    <h1>Virtuális Múzeum</h1>

    <!-- 1 -->
    <div class="hotspot"
         style="top:25%; left:20%;"
         data-link="muzeum.html">

        Landler

    </div>

    <!-- 2 -->
    <div class="hotspot"
         style="top:55%; left:45%;"
         data-link="ady.html">

        Ady

    </div>

    <!-- 3 -->
    <div class="hotspot"
         style="top:35%; left:70%;"
         data-link="iskola.html">

        Iskola

    </div>

</div>

<script>

const hotspots = document.querySelectorAll('.hotspot');
const main = document.getElementById('main');

hotspots.forEach(h => {

    h.addEventListener('click', () => {

        const link = h.getAttribute('data-link');

        // animáció indítása
        main.classList.add('fade-out');

        // várunk az animáció végéig
        setTimeout(() => {

            window.location.href = link;

        }, 1000);

    });

});

</script>

</body>
</html>
```
